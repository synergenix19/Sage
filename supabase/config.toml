# Supabase project auth config — source of truth for reproducible deployments.
# Apply with: supabase config push --project-ref <ref>
# When switching to a new project: update site_url, additional_redirect_urls,
# and project-ref, then re-link with `supabase link --project-ref <new-ref>`.
#
# PRODUCTION GATE: set enable_confirmations = true and push before any non-POC user exposure.

[auth]
site_url = "https://chat.biosight.ai"
additional_redirect_urls = [
  "https://chat.biosight.ai/**",
  "https://cdai-alpha.vercel.app/**",
  "http://localhost:3000/**"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[auth.email]
enable_signup = true
double_confirm_changes = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600
# POC: disabled so new users bypass email verification. Re-enable for production.
enable_confirmations = false
