<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — غير متصل</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #fff; }
    .card { text-align: center; padding: 2rem; max-width: 360px; }
    .ar { direction: rtl; margin-top: 1rem; }
    button { margin-top: 1.5rem; padding: 0.75rem 1.5rem; border: none; border-radius: 999px; background: #6750a4; color: #fff; font-size: 1rem; cursor: pointer; min-height: 44px; }
  </style>
</head>
<body>
  <div class="card">
    <p>You're offline — please check your connection.</p>
    <p class="ar">أنت غير متصل — يرجى التحقق من اتصالك</p>
    <button onclick="window.location.reload()">Try again / حاول مرة أخرى</button>
  </div>
</body>
</html>
