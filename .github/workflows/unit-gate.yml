name: unit-gate

# Deterministic safety-surface coverage. ferry-gate only covers server.py/state.py/
# skill_ids.py plumbing; this gate covers the routing/skill-selection/executor/composer
# surfaces (graph.py, nodes/, prompts/, rules/, skills/) that the ferry filter misses.
# It runs a curated list of suites that are deterministic (no real LLM/DB calls — the
# LLM is mocked or unused) and currently green, so the gate means something. The whole
# not-slow suite is NOT runnable here: ~53 tests depend on a live OpenRouter/DB (e.g.
# test_language, test_wrong_skill_routing) and would be red in CI.
#
# Existence-filtered: each PR/branch runs whichever curated suites exist on it (the
# engagement suites do not exist on master yet). New deterministic safety suites should
# be ADDED to CANDIDATES below so they are covered as they land.

on:
  push:
    branches: [master]
    paths:
      - 'src/sage_poc/**'
      - 'tests/**'
      - 'pyproject.toml'
      # Corpus is content-as-code: auto-sync ingests it to the prod clinical surface
      # on deploy, so a malformed/mistagged/clinically-wrong chunk must be gated like
      # code. Pairs with test_corpus_integrity.py in CANDIDATES below.
      - 'data/knowledge_corpus/**'
  # Runs on EVERY PR (no path filter) so the required "Safety-surface unit tests" check
  # ALWAYS reports. A path-filtered REQUIRED check never reports on a docs-only PR, and
  # strict branch protection would then deadlock that PR's merge forever (9 open docs/
  # scripts PRs hit exactly this when the check was first made required, 2026-07-10). The
  # job self-gates: it runs the heavy suite only when safety-surface code paths changed
  # (see the "Detect" step) and reports a fast pass otherwise — guard-job pattern, closes
  # ticket 2026-06-24-ci-hard-gate-without-deadlock.md.
  pull_request:

jobs:
  unit:
    name: Safety-surface unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need base history to diff which paths changed

      # Guard: does this PR touch the safety-surface paths the heavy suite protects?
      # If not (docs/scripts/.github-only), skip install+pytest but STILL succeed, so the
      # required check reports green and the PR is not deadlocked. If yes, run the full gate.
      - name: Detect safety-surface changes
        id: detect
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}...HEAD")
          else
            CHANGED=$(git diff --name-only "${{ github.event.before }}...${{ github.sha }}" 2>/dev/null || echo "src/sage_poc/_forcerun")
          fi
          echo "changed files:"; echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(src/sage_poc/|tests/|data/knowledge_corpus/)|^pyproject\.toml$'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=unit-gate guard::No safety-surface code paths changed; reporting pass without running the suite (prevents required-check deadlock on docs-only PRs)."
          fi

      - uses: actions/setup-python@v5
        if: steps.detect.outputs.code == 'true'
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        if: steps.detect.outputs.code == 'true'
        run: pip install -e ".[dev]"

      - name: Static — SageState channel contract (no undeclared node->node channels)
        # Fails the build if any key written by a node and read by another is not a declared
        # SageState channel — LangGraph silently drops undeclared keys (the SG-2 node->node seam,
        # 4th instance of the "components green, seam broken" class). Structural enforcement so
        # this failure mode is impossible, not merely tested.
        if: steps.detect.outputs.code == 'true'
        run: python scripts/check_state_channels.py

      - name: Static — safety trigger-file language parity (no EN-only safety lists)
        # Fails the build if a safety trigger file carries English triggers but no Arabic coverage
        # (bilingual product). Root class of #329 (a live AR medical red-flag bypass) and #330.
        # EXEMPT entries carry a tracking ticket, so debt stays visible while the gate stays green —
        # the never-disarm principle with a workable escape valve.
        if: steps.detect.outputs.code == 'true'
        run: python scripts/check_safety_language_parity.py
      - name: Static — safety detectors read RAW input (language contract)
        # Fails the build if a safety detector call passes translated message_en without raw. Root
        # class of #329/#330 (AR safety bypasses via the translation path). ADR 2026-07-16. Allowlist
        # entries carry tickets (EXEMPT pattern) so transitional debt stays visible, not silent.
        if: steps.detect.outputs.code == 'true'
        run: python scripts/check_safety_reads_raw.py

      - name: Run curated deterministic safety-surface suites
        if: steps.detect.outputs.code == 'true'
        env:
          # Suites mock the LLM or do not call it; a dummy key prevents import-time
          # failures in llm.py. No real network/DB is touched.
          OPENROUTER_API_KEY: dummy-ci
          # The safety gate must NEVER download BGE-M3 (~2GB) — that Hub download hung CI
          # for 30+ min (#298). Force offline so the warm-load fails FAST to the loud stub
          # (conftest _warm_bge_m3_once). Non-slow tests run on the zero-vector stub; @slow
          # tests that need real embeddings are excluded here and would fail-loud if run.
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: |
          set -euo pipefail
          CANDIDATES="
            tests/test_corpus_integrity.py
            tests/test_routing.py
            tests/test_skill_select.py
            tests/test_skill_select_offer.py
            tests/test_skill_select_psychotic.py
            tests/test_v2_flag_off_byte_identical.py
            tests/test_v2_per_route_thresholds.py
            tests/test_v2_abstain.py
            tests/test_v2_anchor_debias.py
            tests/test_v2_crisis_guardrail.py
            tests/test_skill_matching_rules.py
            tests/test_skill_executor.py
            tests/test_state_channel_survival.py
            tests/test_server_helpers.py
            tests/test_schema_conformance.py
            tests/test_intent_route_node.py
            tests/test_engagement_templates.py
            tests/test_composer_intensity.py
            tests/test_freeflow_guardrail.py
            tests/test_p1_mid_freeflow_shape.py
            tests/test_declined_skills_signal.py
            tests/test_nodes.py
            tests/test_phase2_t1_containment_state.py
            tests/test_phase2_t2_contain_action.py
            tests/test_phase2_t3_crisis_supremacy.py
            tests/test_deploy_build_lock.py
            tests/test_signed_fields_manifest.py
            tests/test_conformance_flag_parity.py
            tests/test_harm_to_others_node1_backstop.py
            tests/test_crisis_availability_consistency.py
            tests/test_crisis_config_cross_stack.py
            tests/test_sg2_caveat_firing.py
            tests/test_medical_screen.py
            tests/test_medical_screen_wiring.py
            tests/test_medical_screen_callsite.py
            tests/test_medical_screen_shadow.py
            tests/test_medical_screen_audit.py
            tests/test_medical_screen_serve_resume.py
            tests/test_screen_response_node.py
            tests/test_screen_serve_resume_graph.py
            tests/test_health_version_d1_readback.py
            tests/test_hr_neutrality_gate.py
            tests/test_medical_redflag_ar_329.py
            tests/test_medical_redflag_guard.py
            tests/test_safety_language_parity.py
            tests/test_ocd_compulsion_raw_path.py
            tests/test_ocd_compulsion_ar_330.py
            tests/test_safety_reads_raw.py
            tests/test_safety_copy_urgency.py
            tests/test_rules_safety_hr.py
            tests/test_hr_distress_parse.py
            tests/test_hr_copy_variants.py
            tests/test_hr_terminal.py
            tests/test_hr_crisis_precedence.py
            tests/test_hr_routing.py
            tests/test_hr_audit.py
          "
          # test_crisis_availability_consistency.py (H4): fail-closed guard that no crisis-copy
          # string asserts 24/7 / "24 hours" / "متاح كل وقت" adjacent to the 8am-8pm National line.
          # test_crisis_config_cross_stack.py (H4): MERGE-BLOCKING entry-for-entry parity between
          # backend CRISIS_RESOURCES and the frontend crisis-config.ts. NOTE: it SKIPS (does not
          # block) unless the cdai frontend is present at ../cdai relative to this repo root — CI
          # must checkout the coupled frontend into that path for this gate to actually bite. Until
          # that checkout is wired it is a no-op skip; it is verified green + negative-checked locally.
          # test_nodes.py added 2026-06-13: it carries the skill-selection acute-routing
          # assertions (which skill a presentation routes to) that previously sat OUTSIDE
          # the gate — the blind spot that let #15 (overwhelm -> dbt_tipp, a C1-violating
          # production routing defect) stay red invisibly for weeks. A control that does not
          # watch the surface it exists to protect reads as protection while providing none.
          # NOTE: this suite is currently RED solely on #15
          # (test_selects_grounding_for_overwhelmed_phrasing), a tracked PRE-EXISTING
          # production defect under clinical adjudication, NOT introduced by this branch.
          # It clears when #15's clinically-signed fix lands (separate master PR). Do not
          # silence the assertion to make the gate green.
          FILES=""
          SKIPPED=""
          for f in $CANDIDATES; do
            if [ -f "$f" ]; then FILES="$FILES $f"; else SKIPPED="$SKIPPED $f"; fi
          done
          echo "Running existence-filtered suites:$FILES"
          # Visibility guard: a branch that deletes/renames a covered suite silently
          # drops it from the gate and still goes green. Surface the absent suites as a
          # GitHub annotation so "the test that would have caught this isn't present on
          # this branch" is visible, not invisible. Non-fatal by design: the engagement
          # suites legitimately do not exist on master yet.
          if [ -n "$SKIPPED" ]; then
            echo "::warning title=unit-gate skipped suites::Not present on this branch (not run):$SKIPPED"
          fi
          pytest $FILES -m "not slow" -p no:randomly --tb=short
