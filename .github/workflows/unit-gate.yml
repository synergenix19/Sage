name: unit-gate

# Deterministic safety-surface coverage. ferry-gate only covers server.py/state.py/
# skill_ids.py plumbing; this gate covers the routing/skill-selection/executor/composer
# surfaces (graph.py, nodes/, prompts/, rules/, skills/) that the ferry filter misses.
# It runs a curated list of suites that are deterministic (no real LLM/DB calls — the
# LLM is mocked or unused) and currently green, so the gate means something. The whole
# not-slow suite is NOT runnable here: ~53 tests depend on a live OpenRouter/DB (e.g.
# test_language, test_wrong_skill_routing) and would be red in CI.
#
# Existence-filtered: each PR/branch runs whichever curated suites exist on it (the
# engagement suites do not exist on master yet). New deterministic safety suites should
# be ADDED to CANDIDATES below so they are covered as they land.

on:
  push:
    branches: [master]
    paths:
      - 'src/sage_poc/**'
      - 'tests/**'
      - 'pyproject.toml'
      # Corpus is content-as-code: auto-sync ingests it to the prod clinical surface
      # on deploy, so a malformed/mistagged/clinically-wrong chunk must be gated like
      # code. Pairs with test_corpus_integrity.py in CANDIDATES below.
      - 'data/knowledge_corpus/**'
  pull_request:
    paths:
      - 'src/sage_poc/**'
      - 'tests/**'
      - 'pyproject.toml'
      # Corpus is content-as-code: auto-sync ingests it to the prod clinical surface
      # on deploy, so a malformed/mistagged/clinically-wrong chunk must be gated like
      # code. Pairs with test_corpus_integrity.py in CANDIDATES below.
      - 'data/knowledge_corpus/**'

jobs:
  unit:
    name: Safety-surface unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run curated deterministic safety-surface suites
        env:
          # Suites mock the LLM or do not call it; a dummy key prevents import-time
          # failures in llm.py. No real network/DB is touched.
          OPENROUTER_API_KEY: dummy-ci
        run: |
          set -euo pipefail
          CANDIDATES="
            tests/test_corpus_integrity.py
            tests/test_routing.py
            tests/test_skill_select.py
            tests/test_skill_select_offer.py
            tests/test_skill_select_psychotic.py
            tests/test_v2_flag_off_byte_identical.py
            tests/test_v2_per_route_thresholds.py
            tests/test_v2_abstain.py
            tests/test_v2_anchor_debias.py
            tests/test_v2_crisis_guardrail.py
            tests/test_skill_matching_rules.py
            tests/test_skill_executor.py
            tests/test_schema_conformance.py
            tests/test_intent_route_node.py
            tests/test_engagement_templates.py
            tests/test_composer_intensity.py
            tests/test_freeflow_guardrail.py
            tests/test_p1_mid_freeflow_shape.py
            tests/test_declined_skills_signal.py
            tests/test_nodes.py
          "
          # test_nodes.py added 2026-06-13: it carries the skill-selection acute-routing
          # assertions (which skill a presentation routes to) that previously sat OUTSIDE
          # the gate — the blind spot that let #15 (overwhelm -> dbt_tipp, a C1-violating
          # production routing defect) stay red invisibly for weeks. A control that does not
          # watch the surface it exists to protect reads as protection while providing none.
          # NOTE: this suite is currently RED solely on #15
          # (test_selects_grounding_for_overwhelmed_phrasing), a tracked PRE-EXISTING
          # production defect under clinical adjudication, NOT introduced by this branch.
          # It clears when #15's clinically-signed fix lands (separate master PR). Do not
          # silence the assertion to make the gate green.
          FILES=""
          SKIPPED=""
          for f in $CANDIDATES; do
            if [ -f "$f" ]; then FILES="$FILES $f"; else SKIPPED="$SKIPPED $f"; fi
          done
          echo "Running existence-filtered suites:$FILES"
          # Visibility guard: a branch that deletes/renames a covered suite silently
          # drops it from the gate and still goes green. Surface the absent suites as a
          # GitHub annotation so "the test that would have caught this isn't present on
          # this branch" is visible, not invisible. Non-fatal by design: the engagement
          # suites legitimately do not exist on master yet.
          if [ -n "$SKIPPED" ]; then
            echo "::warning title=unit-gate skipped suites::Not present on this branch (not run):$SKIPPED"
          fi
          pytest $FILES -m "not slow" -p no:randomly --tb=short
